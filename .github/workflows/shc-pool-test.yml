name: SHC Pool E2E Test

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: "Unique runner label"
        required: true
        type: string

jobs:
  go-test-on-shc:
    runs-on:
      - self-hosted
      - linux
      - x64
      - shc
      - ${{ inputs.runner_label }}
    timeout-minutes: 5
    steps:
      - name: Machine info
        run: |
          echo "=== SHC Firecracker μVM ==="
          uname -r
          cat /etc/os-release | head -2
          free -h | head -2
          df -h / | head -2
          echo "CPUs: $(nproc)"
      - name: Install Go (runtime)
        run: |
          echo "Installing Go 1.24.2..."
          curl -fsSL https://go.dev/dl/go1.24.2.linux-amd64.tar.gz | tar xz -C /usr/local/
          ln -sf /usr/local/go/bin/go /usr/local/bin/go
          go version
      - name: Go test
        run: |
          mkdir -p /tmp/test-go && cd /tmp/test-go
          cat > go.mod <<MOD
          module shc-test
          go 1.21
          MOD
          cat > main_test.go <<TEST
          package main
          import "testing"
          func TestAdd(t *testing.T) {
              if 1+1 != 2 { t.Error("math is broken") }
          }
          func TestString(t *testing.T) {
              if "hello"+"world" != "helloworld" { t.Error("strings broken") }
          }
          TEST
          go test -v -count=1 ./...
      - name: Done
        run: echo "Job completed at $(date -u +%FT%TZ) on $(hostname)"
