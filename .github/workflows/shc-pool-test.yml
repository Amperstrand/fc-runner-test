name: SHC Pool E2E Test

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: "Unique runner label"
        required: true
        type: string

jobs:
  go-test-on-shc:
    runs-on:
      - self-hosted
      - linux
      - x64
      - shc
      - ${{ inputs.runner_label }}
    timeout-minutes: 5
    steps:
      - name: Machine info
        run: |
          echo "=== Running on SHC Firecracker μVM ==="
          uname -a
          cat /etc/os-release | head -3
          free -h | head -2
          df -h / | head -2
          nproc
      - name: Checkout
        run: |
          # Shell-based checkout (no actions/checkout dependency)
          # Using a tiny Go module so we don't need the full tollgate repo
          mkdir -p /tmp/test-go && cd /tmp/test-go
          cat > go.mod <<MOD
          module shc-test
          go 1.21
          MOD
          cat > main_test.go <<TEST
          package main
          import "testing"
          func TestAdd(t *testing.T) {
              if 1+1 != 2 { t.Error("math is broken") }
          }
          func TestString(t *testing.T) {
              if "hello"+"world" != "helloworld" { t.Error("strings broken") }
          }
          TEST
      - name: Go test
        run: |
          cd /tmp/test-go
          go test -v -count=1 ./...
      - name: Done
        run: echo "Job completed at $(date -u +%FT%TZ)"
